<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

    <h1 class="h1">Fake News Detector</h1>

    <p>Enter the news below:</p>

    <textarea id="news" rows="8" cols="50" placeholder="Type or paste news here..."></textarea>
    <br><br>

    <button onclick="checkNews()">Check News</button>

    <h2 id="result"></h2>

    <script>
        function checkNews() {
            var news = document.getElementById("news").value.toLowerCase();

            if (news.includes("shocking") || news.includes("viral") || news.includes("breaking")) {
                document.getElementById("result").innerHTML = "Result: Fake News";
            } else {
                document.getElementById("result").innerHTML = "Result: Real News";
            }
        }
    </script>

</body>
</html>
